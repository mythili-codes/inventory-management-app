<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Inventory</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">
        <div class="logo-icon">📦</div>
      </div>
      <h1>Create your account</h1>
      <p class="subtitle">Start managing your inventory</p>

      <form id="signup-form">
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password (min 6 chars)</label>
          <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-full" id="submit-btn">Create account</button>
        <div class="error" id="error"></div>
        <div class="success-msg" id="success"></div>
      </form>

      <p class="text-center mt-3" style="font-size: 13px; color: var(--muted);">
        Already have an account? <a href="login.html" class="link">Log in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    redirectIfAuthed();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error');
      const okEl = document.getElementById('success');
      errEl.classList.remove('show');
      okEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const { data, error } = await supabase.auth.signUp({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        options: {
          data: { full_name: document.getElementById('name').value.trim() },
        },
      });

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }

      // If email confirmation is OFF, user has a session already and we go straight in
      if (data.session) {
        window.location.href = 'dashboard.html';
      } else {
        okEl.textContent = 'Account created! Check your email to confirm, then log in.';
        okEl.classList.add('show');
        btn.textContent = 'Done';
      }
    });
  </script>
</body>
</html>
