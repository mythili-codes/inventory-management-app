<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Inventory</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <!-- Brand panel -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 8v13H3V8"/>
            <path d="M1 3h22v5H1z"/>
            <line x1="10" y1="12" x2="14" y2="12"/>
          </svg>
        </div>
        <h2>Inventory<br>Management</h2>
        <p>Track your stock, manage your business — all in one secure dashboard.</p>
        <ul class="brand-features">
          <li>
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span> Enterprise-grade security
          </li>
          <li>
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
              </svg>
            </span> Real-time analytics
          </li>
          <li>
            <span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </span> Your data stays yours
          </li>
        </ul>
      </div>
    </div>

    <!-- Form panel -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">
        <div class="form-header">
          <h1>Welcome back</h1>
          <p>Sign in to your inventory dashboard</p>
        </div>

        <form id="login-form" novalidate>
          <div class="input-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
              <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
                <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="alert alert-error" id="error" style="display:none;"></div>

          <button type="submit" class="btn-primary" id="submit-btn">
            <span class="btn-text">Sign in</span>
            <span class="btn-spinner">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
              </svg>
            </span>
          </button>

          <p class="form-footer">
            Don't have an account? <a href="signup.html">Create one</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/supabase-sdk.js"></script>
  <script>
  (function () {
    'use strict';

    const SUPABASE_URL = 'https://ktebdpbihqygipwmxqkq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZWJkcGJpaHF5Z2lwd214cWtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTU3MzgsImV4cCI6MjA5NjU5MTczOH0.iQdudIBROJhXCOGWgvnjbnzikbmxuCcyF0Rn_uSCAUw';

    let sb = null;
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (err) {
      console.error('Supabase init failed:', err);
    }

    const $ = (id) => document.getElementById(id);
    const form = $('login-form');
    const submitBtn = $('submit-btn');
    const errorEl = $('error');
    const toast = $('toast');

    function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
    function hideError() { errorEl.style.display = 'none'; }
    function showToast(msg, isError) {
      toast.textContent = msg;
      toast.classList.toggle('error', !!isError);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.classList.toggle('loading', loading);
    }

    // Password toggle
    $('pw-toggle').addEventListener('click', () => {
      const pw = $('password');
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      $('eye-open').style.display = isHidden ? 'none' : 'block';
      $('eye-closed').style.display = isHidden ? 'block' : 'none';
      $('pw-toggle').setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    // Redirect if already logged in
    if (sb) {
      sb.auth.getSession().then(({ data }) => {
        if (data && data.session) {
          window.location.href = 'dashboard.html';
        }
      }).catch(() => {});
    }

    // Login submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email = $('email').value.trim();
      const password = $('password').value;

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }
      if (!sb) {
        showError('Connection error. Please refresh the page.');
        return;
      }

      setLoading(true);

      let res;
      try {
        res = await sb.auth.signInWithPassword({ email, password });
      } catch (err) {
        setLoading(false);
        showError('Network error. Please check your connection.');
        return;
      }

      const { data, error } = res;

      if (error) {
        setLoading(false);
        showError(error.message);
        showToast(error.message, true);
        return;
      }

      if (data && data.session) {
        showToast('✅ Welcome back!');
        submitBtn.querySelector('.btn-text').textContent = '✓ Signing you in...';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        return;
      }

      setLoading(false);
      showError('Sign in failed. Please try again.');
    });
  })();
  </script>
</body>
</html>
