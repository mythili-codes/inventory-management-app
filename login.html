<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Inventory</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <!-- Left panel — brand -->
    <div class="auth-brand">
      <div class="brand-content">
        <div class="brand-logo">📦</div>
        <h2>Inventory<br>Management</h2>
        <p>Track your stock, manage your business — all in one secure dashboard.</p>
        <ul class="brand-features">
          <li><span>🔐</span> Enterprise-grade security</li>
          <li><span>📊</span> Real-time analytics</li>
          <li><span>🛡️</span> Your data stays yours</li>
        </ul>
      </div>
      <div class="brand-decor decor-1"></div>
      <div class="brand-decor decor-2"></div>
    </div>

    <!-- Right panel — form -->
    <div class="auth-form-panel">
      <div class="auth-form-inner">
        <div class="form-header">
          <h1>Welcome back</h1>
          <p>Sign in to your inventory dashboard</p>
        </div>

        <form id="login-form" novalidate>
          <div class="input-group">
            <label for="email">Email address</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
            </div>
          </div>

          <div class="input-group">
            <label for="password">
              Password
              <a href="#" class="label-link" onclick="event.preventDefault(); alert('Password reset coming soon!')">Forgot?</a>
            </label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
              <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePassword()" aria-label="Show password">
                <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="alert alert-error" id="error" style="display:none;"></div>

          <button type="submit" class="btn-primary" id="submit-btn">
            <span class="btn-text">Sign in</span>
            <span class="btn-spinner">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
              </svg>
            </span>
          </button>

          <p class="form-footer">
            Don't have an account? <a href="signup.html">Create one</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ktebdpbihqygipwmxqkq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZWJkcGJpaHF5Z2lwd214cWtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTU3MzgsImV4cCI6MjA5NjU5MTczOH0.iQdudIBROJhXCOGWgvnjbnzikbmxuCcyF0Rn_uSCAUw';

    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redirect if already logged in
    (async () => {
      const { data: { session } } = await sbClient.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    function togglePassword() {
      const pw = document.getElementById('password');
      const eyeOpen = document.getElementById('eye-open');
      const eyeClosed = document.getElementById('eye-closed');
      const btn = document.getElementById('pw-toggle');

      if (pw.type === 'password') {
        pw.type = 'text';
        eyeOpen.style.display = 'none';
        eyeClosed.style.display = 'block';
        btn.setAttribute('aria-label', 'Hide password');
      } else {
        pw.type = 'password';
        eyeOpen.style.display = 'block';
        eyeClosed.style.display = 'none';
        btn.setAttribute('aria-label', 'Show password');
      }
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.toggle('error', isError);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showError(message) {
      const errEl = document.getElementById('error');
      errEl.textContent = message;
      errEl.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.classList.add('loading');

      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;

      if (!email || !pw) {
        showError('Please enter both email and password.');
        btn.disabled = false;
        btn.classList.remove('loading');
        return;
      }

      try {
        const { data, error } = await sbClient.auth.signInWithPassword({ email, password: pw });

        if (error) {
          showError(error.message);
          showToast(error.message, true);
          btn.disabled = false;
          btn.classList.remove('loading');
          return;
        }

        showToast('✅ Welcome back! Redirecting...');
        btn.querySelector('.btn-text').textContent = '✓ Success';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      } catch (ex) {
        showError('Something went wrong. Please try again.');
        showToast('Connection error', true);
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
