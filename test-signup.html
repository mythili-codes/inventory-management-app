<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Test Signup — Debug</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f5f7; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #16a34a; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 20px; font-size: 14px; }
    input { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.6; }
    #log { margin-top: 20px; padding: 15px; background: #1a1a2e; color: #3ecf8e; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; line-height: 1.6; max-height: 300px; overflow-y: auto; }
    .success { background: #dcfce7 !important; color: #15803d !important; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧪 Test Signup</h1>
    <p>This is a debug page. Every action is logged below.</p>

    <input type="text" id="name" placeholder="Name" value="Mythili">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password (6+ chars)" value="test1234">

    <button id="btn" onclick="doSignup()">Create Account</button>

    <div id="log">Ready. Click 'Create Account' to test.
</div>
  </div>

  <script src="js/supabase-sdk.js"></script>
  <script>
    const log = document.getElementById('log');
    function say(msg, isError) {
      const line = document.createElement('div');
      if (isError) line.className = 'error';
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      log.appendChild(line);
      log.scrollTop = log.scrollHeight;
    }

    say('Page loaded');
    say('window.supabase exists: ' + (typeof window.supabase !== 'undefined'));
    say('createClient exists: ' + (window.supabase && typeof window.supabase.createClient === 'function'));

    // Auto-fill email with unique timestamp
    document.getElementById('email').value = 'test' + Date.now() + '@gmail.com';

    let sb = null;
    try {
      sb = window.supabase.createClient(
        'https://ktebdpbihqygipwmxqkq.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZWJkcGJpaHF5Z2lwd214cWtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTU3MzgsImV4cCI6MjA5NjU5MTczOH0.iQdudIBROJhXCOGWgvnjbnzikbmxuCcyF0Rn_uSCAUw'
      );
      say('✅ Supabase client created');
    } catch (e) {
      say('❌ Client init error: ' + e.message, true);
    }

    async function doSignup() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Signing up...';

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      say('--- SIGNUP STARTED ---');
      say('Email: ' + email);
      say('Password length: ' + password.length);

      if (!sb) {
        say('❌ No supabase client!', true);
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      try {
        say('Calling supabase.auth.signUp...');
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });

        if (error) {
          say('❌ Error: ' + error.message, true);
          btn.disabled = false;
          btn.textContent = 'Create Account';
          return;
        }

        if (data.session) {
          say('🎉 SUCCESS! Session created!');
          say('User ID: ' + data.user.id);
          say('Access token: ' + data.session.access_token.substring(0, 20) + '...');
          log.classList.add('success');
          btn.textContent = '✅ Success! (redirecting in 3s)';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
        } else {
          say('⚠️ User created but no session (confirmation still needed)');
          say('User ID: ' + (data.user ? data.user.id : 'none'));
          btn.textContent = 'Check email';
        }
      } catch (ex) {
        say('💥 Exception: ' + (ex.message || ex), true);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
