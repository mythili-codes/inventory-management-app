<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory</title>
  <link rel="stylesheet" href="css/design-system.css">
  <style>
    body {
      background: var(--color-slate-900);
      color: var(--color-text-invert);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.08) 0, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.06) 0, transparent 40%);
      pointer-events: none;
    }
    .loader-card {
      position: relative;
      text-align: center;
      padding: var(--space-8);
      z-index: 1;
    }
    .loader-mark {
      width: 56px;
      height: 56px;
      background: var(--color-primary-500);
      border-radius: var(--radius-xl);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      margin-bottom: var(--space-5);
    }
    .loader-card h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--space-2);
    }
    .loader-card p { color: var(--color-slate-400); margin-bottom: var(--space-5); }
    .loader-spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--color-primary-500);
      border-radius: var(--radius-full);
      animation: spin 0.7s linear infinite;
    }
    .loader-links { margin-top: var(--space-6); display: flex; gap: var(--space-4); justify-content: center; }
    .loader-links a { color: var(--color-primary-500); font-weight: 600; }
  </style>
</head>
<body>
  <div class="loader-card">
    <div class="loader-mark">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><line x1="10" y1="12" x2="14" y2="12"/>
      </svg>
    </div>
    <h1>Inventory</h1>
    <p>Checking your session…</p>
    <div class="loader-spinner" aria-hidden="true"></div>
    <div class="loader-links">
      <a href="login.html">Sign in</a>
      <a href="signup.html">Create account</a>
    </div>
  </div>

  <script src="js/supabase-sdk.js"></script>
  <script>
  (function () {
    'use strict';
    const SUPABASE_URL = 'https://ktebdpbihqygipwmxqkq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZWJkcGJpaHF5Z2lwd214cWtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTU3MzgsImV4cCI6MjA5NjU5MTczOH0.iQdudIBROJhXCOGWgvnjbnzikbmxuCcyF0Rn_uSCAUw';

    const fallback = setTimeout(() => { window.location.href = 'login.html'; }, 4000);
    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      sb.auth.getSession().then(({ data }) => {
        clearTimeout(fallback);
        window.location.href = (data && data.session) ? 'dashboard.html' : 'login.html';
      }).catch(() => {
        clearTimeout(fallback);
        window.location.href = 'login.html';
      });
    } catch (_) {
      clearTimeout(fallback);
      window.location.href = 'login.html';
    }
  })();
  </script>
</body>
</html>
